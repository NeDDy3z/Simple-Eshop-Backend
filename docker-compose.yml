services:
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eshop-net

  product-db:
    image: postgres:15
    environment:
      POSTGRES_DB: eshop-product-db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d eshop-product-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eshop-net

  order-db:
    image: postgres:15
    environment:
      POSTGRES_DB: eshop-order-db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d eshop-order-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eshop-net

  product-app:
    build:
      context: ./product-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://product-db:5432/eshop-product-db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
    depends_on:
      product-db:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - eshop-net

  order-app:
    build:
      context: ./order-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-db:5432/eshop-order-db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_started
      product-app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - eshop-net

  notification-app:
    build:
      context: ./notification-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_started
    networks:
      - eshop-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,z
    depends_on:
      product-app:
        condition: service_healthy
      order-app:
        condition: service_healthy
    networks:
      - eshop-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # disable httpos
      - ES_JAVA_OPTS=-Xms512m -Xmx512m # memory limit
    ports:
      - "9200:9200"
    networks:
      - eshop-net

networks:
  eshop-net:
    driver: bridge
