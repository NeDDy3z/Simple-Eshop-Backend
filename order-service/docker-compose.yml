services:
  order-app:
    build: .
    container_name: order-app
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-db:5432/eshop-order-db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - order-db
    networks:
      - eshop-net

  order-db:
    image: postgres:15
    container_name: order-db
    environment:
      POSTGRES_DB: eshop-order-db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - eshop-net

networks:
  eshop-net:
    external: true
