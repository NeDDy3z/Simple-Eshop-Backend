services:
  product-app:
    build: .
    container_name: product-app
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://product-db:5432/eshop-product-db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - product-db
    networks:
      - eshop-net

  product-db:
    image: postgres:15
    container_name: product-db
    environment:
      POSTGRES_DB: eshop-product-db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - eshop-net

networks:
  eshop-net:
    external: true
