spring.application.name=product-service
server.port=${PORT:8080}

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:eshop-product-db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.properties.security.protocol=${SPRING_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${SPRING_KAFKA_SASL_MECHANISM:}
spring.kafka.properties.sasl.jaas.config=${SPRING_KAFKA_SASL_JAAS_CONFIG:}
spring.kafka.consumer.group-id=product-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka serialization configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.type.mapping=productSync:cz.cvut.fel.nss.product.dto.ProductSyncEvent,stockStatus:cz.cvut.fel.nss.product.dto.StockStatusEvent

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=orderCreated:cz.cvut.fel.nss.product.dto.OrderEventDto

# Security JWT configuration
application.security.jwt.secret-key=moje-super-tajne-heslo-pro-nss-projekt-12345
application.security.jwt.expiration=86400000

# Cache configuration
spring.cache.type=hazelcast

# Elasticsearch configuration
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
